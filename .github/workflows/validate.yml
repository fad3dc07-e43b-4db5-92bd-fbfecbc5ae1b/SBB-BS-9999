name: Validate Design Artifact

on:
  pull_request:
    branches:
      - main
    paths:
      - "artifact/**"
      - ".github/workflows/**"

  push:
    branches:
      - main
    paths:
      - "artifact/**"
      - ".github/workflows/**"

jobs:
  validate-structure:
    name: Validate repository structure
    uses: fad3dc07-e43b-4db5-92bd-fbfecbc5ae1b/ci-architecture-governance/.github/workflows/validate-repository-structure.yml@main

  validate-source:
    name: Validate source document
    uses: fad3dc07-e43b-4db5-92bd-fbfecbc5ae1b/ci-architecture-governance/.github/workflows/validate-archimate-source.yml@main

  report:
    name: Report validation results
    needs:
      - validate-structure
      - validate-source
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print consolidated report
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          structure = json.loads(os.environ["STRUCTURE_REPORT"])
          source = json.loads(os.environ["SOURCE_REPORT"])

          lines = []
          lines.append("| Check | Status |")
          lines.append("|---|---|")
          lines.append(f"| Repository structure | `{structure['status']}` |")
          lines.append(f"| Archimate source | `{source['status']}` |")
          lines.append("")
          lines.append(f"- Structure: `{structure['status']}`")
          for item in structure.get("observations", []):
              lines.append(f"  - {item}")
          lines.append(f"- Source: `{source['status']}`")
          for item in source.get("observations", []):
              lines.append(f"  - {item}")

          summary_path = Path(os.environ.get("GITHUB_STEP_SUMMARY", "/tmp/step-summary.md"))
          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")

          if structure["status"] != "PASS" or source["status"] != "PASS":
              sys.exit(1)
          PY
        env:
          STRUCTURE_REPORT: ${{ needs.validate-structure.outputs.report }}
          SOURCE_REPORT: ${{ needs.validate-source.outputs.report }}
