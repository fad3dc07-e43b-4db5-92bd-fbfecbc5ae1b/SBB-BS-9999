name: Validate Design Artifact

on:
  pull_request:
    branches:
      - main
    paths:
      - "artifact/**"
      - ".github/workflows/**"

  push:
    branches:
      - main
    paths:
      - "artifact/**"
      - ".github/workflows/**"

jobs:
  validate-structure:
    name: Validate repository structure
    uses: fad3dc07-e43b-4db5-92bd-fbfecbc5ae1b/ci-architecture-governance/.github/workflows/validate-repository-structure.yml@main

  validate-source:
    name: Validate source document
    uses: fad3dc07-e43b-4db5-92bd-fbfecbc5ae1b/ci-architecture-governance/.github/workflows/validate-archimate-source.yml@main
