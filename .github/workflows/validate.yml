name: Validate Design Artifact

on:
  pull_request:
    branches:
      - main
    paths:
      - "artifact/**"
      - ".github/workflows/**"

  push:
    branches:
      - main
    paths:
      - "artifact/**"
      - ".github/workflows/**"

jobs:
  validate-structure:
    name: Validate repository structure
    uses: fad3dc07-e43b-4db5-92bd-fbfecbc5ae1b/ci-architecture-governance/.github/workflows/validate-repository-structure.yml@main

  validate-source:
    name: Validate source document
    uses: fad3dc07-e43b-4db5-92bd-fbfecbc5ae1b/ci-architecture-governance/.github/workflows/validate-archimate-source.yml@main

  report:
    name: Report validation results
    needs:
      - validate-structure
      - validate-source
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout governance scripts
        uses: actions/checkout@v4
        with:
          repository: fad3dc07-e43b-4db5-92bd-fbfecbc5ae1b/ci-architecture-governance
          path: governance

      - name: Print consolidated report
        shell: bash
        run: |
          status="$(STRUCTURE_REPORT="$STRUCTURE_REPORT" SOURCE_REPORT="$SOURCE_REPORT" node governance/scripts/render-validation-report.mjs)"
          if [ "$status" != "PASS" ]; then exit 1; fi
        env:
          STRUCTURE_REPORT: ${{ needs.validate-structure.outputs.report }}
          SOURCE_REPORT: ${{ needs.validate-source.outputs.report }}
