name: Validate Design Artifact

on:
  pull_request:
    branches:
      - main
    paths:
      - "artifact/**"
      - ".github/workflows/**"

  push:
    branches:
      - main
    paths:
      - "artifact/**"
      - ".github/workflows/**"

jobs:
  validate:
    name: Validate manifest
    uses: fad3dc07-e43b-4db5-92bd-fbfecbc5ae1b/ci-architecture-governance/.github/workflows/validate.yml@main

  report:
    name: Report validation results
    needs:
      - validate
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout governance scripts
        uses: actions/checkout@v4
        with:
          repository: fad3dc07-e43b-4db5-92bd-fbfecbc5ae1b/ci-architecture-governance
          path: governance

      - name: Print consolidated report
        shell: bash
        run: |
          status="$(VALIDATION_REPORT="$VALIDATION_REPORT" node governance/report.mjs)"
          if [ "$status" != "PASS" ]; then exit 1; fi
        env:
          VALIDATION_REPORT: ${{ needs.validate.outputs.report }}
