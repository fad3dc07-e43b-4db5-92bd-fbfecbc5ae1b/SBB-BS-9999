name: CI
# trigger workflow for real Github test
# keep this path filter to validate CALinter on GitHub (summary refresh v4)

on:
  pull_request:
    branches:
      - main
    paths:
      - "artifact/**"
      - ".github/workflows/**"

  push:
    branches:
      - main
    paths:
      - "artifact/**"
      - ".github/workflows/**"

jobs:
  execute_rules:
    name: Validar cumplimiento
    uses: ContinuousArchitecture/CALinter/.github/workflows/compliance.yml@main
